{% extends 'base.html' %}

{% block content %}
<div class="row align-items-center mt-5">
    <div class="col-md-6">
        <h1 class="display-4 fw-bold">Welcome to MediCare</h1>
        <p class="lead text-muted">Book your doctor appointments easily and manage your health records in one place.</p>
        <div class="mt-4">
            <a href="{% url 'patient_register' %}" class="btn btn-primary btn-lg me-3">Book Appointment</a>
            <a href="{% url 'login' %}" class="btn btn-outline-secondary btn-lg">Login</a>
        </div>
    </div>
    <div class="col-md-6 text-center">
        <!-- Placeholder for hero image -->
        <div class="bg-light p-5 rounded-circle shadow-sm d-inline-block"
            style="width: 300px; height: 300px; line-height: 250px;">
            <i class="fas fa-stethoscope fa-5x text-primary"></i>
        </div>
    </div>
</div>
{% endblock %}
